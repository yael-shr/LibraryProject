<div class="container" style="max-width: 500px; margin: 40px auto; padding: 20px; border: 1px solid #ddd; border-radius: 8px; text-align: center;">
  <h2>מחיקת ספר</h2>
  <p>האם את בטוחה שברצונך למחוק את הספר הזה?</p>
  <p><strong>שים לב:</strong> פעולה זו היא סופית ולא ניתן לבטלה.</p>

  <div style="margin-top: 20px;">
    <button (click)="confirmDelete()" class="btn btn-danger" style="padding: 10px 20px; cursor: pointer; background-color: #f44336; color: white; border: none; border-radius: 4px; margin: 0 5px;">
      מחק ספר
    </button>
    <button (click)="cancel()" class="btn btn-secondary" style="padding: 10px 20px; cursor: pointer; background-color: #6c757d; color: white; border: none; border-radius: 4px; margin: 0 5px;">
      ביטול
    </button>
  </div>
</div>
